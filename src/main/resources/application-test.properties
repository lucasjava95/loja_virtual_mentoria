spring.application.name=loja_virtual_mentoria

spring.datasource.url=jdbc:postgresql://localhost:5432/loja_virtual_mentoria?autoreconnect=true

spring.datasource.username=postgres

spring.datasource.password=admin

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update


#evitar erros de metadados
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL9Dialect


#indica o dialeto pro Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.servlet.context-path= /loja_virtual_mentoria



#spring.jpa.open-in-view=true
#spring.profiles.active= production




#abaixo, configuraçőes de Upload

spring.servlet.multipart.max-file-size = 10000KB

spring.servlet.multipart.max-request-size = 10000KB

spring.servlet.multipart.enabled=true


#abaixo, configuraçőes para comprimir dados que o servidor vai enviar e retornar para a gente

server.compression.enabled=true

server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

#tamanho mínimo de compresăo
server.compression.min-response-size=1024

server.http2.enabled=true


#abaixo, configuraçőes de codificaçăo

server.servlet.encoding.charset = UTF-8
server.servlet.encoding.enabled = true
server.servlet.encoding.force = true
server.servlet.encoding.force-request = true
server.servlet.encoding.force-response = true
 



#abaixo, configuraçőes de Pool de conexőes

spring.datasource.type=com.zaxxer.hikari.HikariDataSource


#numero maximo de milisegundos que um cliente aguardara por uma conexăo
spring.datasource.hikari.connection-timeout=20000


#numero minimo de conexoes inativas mantidas pelo HikariCP em um conjunto de conexoes
spring.datasource.hikari.minimum-idle=200


#maximo do Pool de conexao
spring.datasource.hikari.maximum-pool-size=550




#abaixo, configuraçőes de Tempo Ocioso para Conexăo

spring.datasource.hikari.idle-timeout=10000

spring.datasource.hikari.pool-name=PoolHikari

spring.datasource.dbcp2.pool-prepared-statements=true

#numero de portas disponiveis para execuçăo de SQLs no BD
spring.datasource.dbcp2.max-open-prepared-statements=550



#Abaixo, configuraçőes para salvar dados no BD automaticamente

spring.datasource.hikari.auto-commit=false

#numero maximo de tempo que o usuario pode ficar logado no projeto/sistema
server.servlet.session.timeout=240m

spring.transaction.rollback-on-commit-failure=true


#as 3 primeiras seguintes săo configuraçőes de processamento em lotes
spring.jpa.properties.hibernate.jdbc.batch_size=4

spring.jpa.properties.hibernate.order_inserts=true

spring.jpa.properties.hibernate.order_updates=true



#numero maximo de conexoes para o Tomcat
server.tomcat.max-connections=50000

#processamento de Performace
server.tomcat.threads.min-spare=1000


#limpar sujeira no BD a cada 4 horas, caso haja transaçoes no BD que năo estăo sendo mais usadas
spring.session.jdbc.cleanup-cron= 0 0 4 * * *


#configuraçőes para permitir acesso a pasta static, para que o Spring năo bloquei acesso a imagens, arquivos Js, etc
spring.mvc.static-path-pattern=/resources/static/**



